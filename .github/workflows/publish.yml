"on":
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      project_path:
        required: true
        type: string
      framework:
        required: true
        type: string
      os:
        required: true
        type: string
      target:
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: "${{ inputs.os }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install msquic (Linux)
        if: ${{ !startsWith(inputs.target, 'win-') }}
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y curl gnupg && \
          curl -sSL https://packages.microsoft.com/config/debian/12/packages-microsoft-prod.deb -o packages-microsoft-prod.deb && \
          sudo dpkg -i packages-microsoft-prod.deb && \
          sudo apt-get update && sudo apt-get install -y libmsquic

      - name: "Build and Publish ${{ inputs.project_name }}"
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)

            release_name="TwitchDropsBot-${{ inputs.project_name }}-${{ inputs.target }}-$tag"

            # Build the project
            dotnet publish ${{ inputs.project_path }} \
              -f ${{ inputs.framework }} \
              -r ${{ inputs.target }} \
              -p:PublishSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -c Release \
              -o "$release_name"

      - name: Bundle msquic native libs (Linux)
        if: ${{ !startsWith(inputs.target, 'win-') }}
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{ inputs.target }}-$tag"
          cp /usr/lib/x86_64-linux-gnu/libmsquic* "$release_name/" 2>/dev/null || echo "No msquic libs found at /usr/lib/x86_64-linux-gnu/"

      - name: Bundle msquic native libs (Windows)
        if: "${{ startsWith(inputs.target, 'win-') }}"
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{inputs.target }}-$tag"

          # Copy msquic.dll from NuGet package cache
          msquic_path="$HOME/.nuget/packages/microsoft.native.quic.msquic.schannel/2.5.8/build/native/bin/x64/msquic.dll"
          if [ -f "$msquic_path" ]; then
            cp "$msquic_path" "$release_name/"
            echo "msquic.dll copied to $release_name/"
          else
            echo "msquic.dll not found at $msquic_path"
            exit 1
          fi

      - name: Package for Windows
        shell: bash
        if: "${{ startsWith(inputs.target, 'win-') }}"
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{inputs.target }}-$tag"

          # Package as zip
          7z a -tzip "${release_name}.zip" "./${release_name}/*"

          # Clean up
          rm -r "$release_name"

      - name: Package for Unix
        shell: bash
        if: "${{ !startsWith(inputs.target, 'win-') }}"
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="TwitchDropsBot-${{ inputs.project_name }}-${{inputs.target }}-$tag"

          # Package as tar.gz
          tar czvf "${release_name}.tar.gz" "$release_name"

          # Clean up
          rm -r "$release_name"
          
      - name: Publish Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: "TwitchDropsBot-${{ inputs.project_name }}-*"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
